name: CI to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: LUYENHUYMANH
          password: LUYENHUYMANH

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            LUYENHUYMANH/spring-boot-app:latest
            LUYENHUYMANH/spring-boot-app:v1